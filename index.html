<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MB LEGACY STORE</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="text-align:center; padding-top:100px; background:#000; color:#fff; font-family:sans-serif;">

    <h1 style="color:gold;">MB LEGACY STORE</h1>
    <p id="st" style="color:cyan;">[ STATUS: READY ]</p>

    <button onclick="connectPi()" style="padding:20px; width:80%; background:green; color:white; font-weight:bold; border-radius:10px; border:none;">
        1. CONNECT PI ACCOUNT
    </button>
    
    <br><br>
    
    <button onclick="payPi()" style="padding:20px; width:80%; background:purple; color:white; font-weight:bold; border-radius:10px; border:none;">
        2. PAY 1.0 PI
    </button>

    <script>
        // Init SDK
        Pi.init({ version: "2.0", sandbox: false });

        function connectPi() {
            document.getElementById('st').innerText = "CONNECTING...";
            Pi.authenticate(['payments'], function(auth) {
                document.getElementById('st').innerText = "CONNECTED: " + auth.user.username;
                alert("Login Success!");
            }, function(err) {
                alert("Auth Error: " + err.message);
                document.getElementById('st').innerText = "ERROR: TRY REFRESH";
            });
        }

        function payPi() {
            Pi.createPayment({
                amount: 1.0,
                memo: "Verification MB Legacy Store",
                metadata: { orderId: "101" }
            }, {
                onReadyForServerApproval: (id) => { console.log(id); },
                onReadyForServerCompletion: (id, tx) => { alert("SUCCESS! TX: " + tx); },
                onCancel: (id) => { alert("Cancelled"); },
                onError: (e) => { alert("Error: " + e.message); }
            });
        }
    </script>
</body>
</html>
