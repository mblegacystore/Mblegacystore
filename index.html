<!DOCTYPE html>
<html>
<head>
    <title>MBL STORE</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="text-align:center; padding-top:100px; font-family:sans-serif;">
    <h1>MB LEGACY STORE</h1>
    <div id="st">Ready</div>
    <br>
    <button onclick="login()" style="padding:20px; width:80%; background:green; color:white; border-radius:10px;">
        1. CONNECT PI ACCOUNT
    </button>
    <br><br>
    <button onclick="pay()" style="padding:20px; width:80%; background:purple; color:white; border-radius:10px;">
        2. PAY 1.0 PI
    </button>

    <script>
        Pi.init({ version: "2.0", sandbox: false });

        function login() {
            document.getElementById('st').innerText = "Connecting...";
            Pi.authenticate(['payments'], function(a) {
                document.getElementById('st').innerText = "Logged in: " + a.user.username;
                alert("Login Success!");
            }, function(e) {
                alert("Error: " + e.message);
                document.getElementById('st').innerText = "Try Again";
            });
        }

        function pay() {
            Pi.createPayment({
                amount: 1.0,
                memo: "Step 10 Final",
                metadata: { id: "101" }
            }, {
                onReadyForServerApproval: (id) => { console.log(id); },
                onReadyForServerCompletion: (id, tx) => { alert("Success! TX: " + tx); },
                onCancel: (id) => { alert("Cancelled"); },
                onError: (e) => { alert("Error: " + e.message); }
            });
        }
    </script>
</body>
</html>
