<!DOCTYPE html>
<html>
<head>
    <title>MBL STORE</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="text-align:center; padding-top:100px;">
    <h1>MB LEGACY STORE</h1>
    <p id="st">Status: Ready</p>
    <br>
    <button onclick="login()" style="padding:20px; width:80%;">1. CONNECT ACCOUNT</button>
    <br><br>
    <button onclick="pay()" style="padding:20px; width:80%;">2. PAY 1.0 PI</button>

    <script>
        Pi.init({ version: "2.0", sandbox: false });
        function login() {
            document.getElementById('st').innerText = "Connecting...";
            Pi.authenticate(['payments'], function(a) {
                document.getElementById('st').innerText = "User: " + a.user.username;
                alert("Success!");
            }, function(e) { alert("Error: " + e.message); });
        }
        function pay() {
            Pi.createPayment({
                amount: 1.0, memo: "Final Test", metadata: { id: "10" }
            }, {
                onReadyForServerApproval: (id) => { console.log(id); },
                onReadyForServerCompletion: (id, tx) => { alert("Done: " + tx); },
                onCancel: (id) => { alert("Cancel"); },
                onError: (e) => { alert("Error: " + e.message); }
            });
        }
    </script>
</body>
</html>
