<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MB LEGACY STORE | Pro</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="text-align: center; padding-top: 100px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: white;">

    <h1 style="color: #ffa500;">MB LEGACY STORE</h1>
    <p id="status" style="color: #ff4500; font-weight: bold;">[ SYSTEM INITIALIZING... ]</p>
    
    <div id="action-zone" style="display: none;">
        <button onclick="login()" style="padding: 15px 30px; font-size: 16px; cursor: pointer; border-radius: 5px; border: none; background-color: #4CAF50; color: white; margin-bottom: 20px;">
            STEP 1: AUTHENTICATE
        </button>
        <br>
        <button onclick="pay()" style="padding: 20px 40px; font-size: 18px; cursor: pointer; border-radius: 10px; border: none; background-color: #673ab7; color: white; font-weight: bold;">
            STEP 2: PAY 1.0 PI
        </button>
    </div>

    <script>
        // 1. Initialize Pi SDK for Mainnet
        try {
            Pi.init({ version: "2.0", sandbox: false });
            document.getElementById('status').innerText = "[ SYSTEM READY: MAINNET MODE ]";
            document.getElementById('status').style.color = "#00ff00";
            document.getElementById('action-zone').style.display = "block";
        } catch (err) {
            document.getElementById('status').innerText = "[ ERROR: OPEN IN PI BROWSER ONLY ]";
        }

        // 2. Authentication Function
        function login() {
            Pi.authenticate(['payments'], function(p) {
                alert("Welcome, " + p.user.username + "! Authentication Successful.");
            }, function(e) {
                alert("Login Failed: " + e.message);
            });
        }

        // 3. Payment Function
        function pay() {
            Pi.createPayment({
                amount: 1.0,
                memo: "Mainnet Verification for MB Legacy Store",
                metadata: { orderId: "mbl-step-10" }
            }, {
                onReadyForServerApproval: function(id) { 
                    console.log("Payment ID:", id); 
                },
                onReadyForServerCompletion: function(id, txid) {
                    alert("BOOM! Payment Success. TXID: " + txid);
                },
                onCancel: function(id) { alert("Payment Cancelled."); },
                onError: function(e) { alert("Payment Error: " + e.message); }
            });
        }
    </script>
</body>
</html>
