<!DOCTYPE html>
<html>
<head>
    <title>MB Legacy Store</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>Pi.init({ version: "2.0", sandbox: true });</script>
</head>
<body style="text-align: center; padding-top: 50px; font-family: Arial;">
    <h2>MB Legacy Store</h2>
    <button onclick="Pi.authenticate(['payments'], (p)=>{}) .then((a)=>alert('Login OK'))" style="padding: 15px; background: yellow;">STEP 1: LOGIN</button>
    <br><br>
    <button onclick="bayar()" style="padding: 15px; background: orange;">STEP 2: BAYAR 0.1 PI</button>

    <script>
        function bayar() {
            Pi.createPayment({
                amount: 0.1,
                memo: "Test",
                metadata: { orderId: "1" }
            }, {
                onReadyForServerApproval: (id) => { console.log(id); },
                onReadyForServerCompletion: (id, txid) => { alert('SETTLE! TXID: ' + txid); },
                onCancel: (id) => {},
                onError: (e) => { alert('Ralat: ' + e.message); }
            });
        }
    </script>
</body>
</html>
