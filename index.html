<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MBL PRO</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="text-align:center; padding-top:100px; background:#111; color:#fff;">
    <h2>MB LEGACY STORE</h2>
    <div id="st" style="color:yellow;">Checking SDK...</div>
    <br>
    <button onclick="loginUser()" style="padding:20px; width:250px; font-weight:bold;">1. PENGESAHAN LOGIN</button>
    <br><br>
    <button onclick="bayarPi()" style="padding:20px; width:250px; background:purple; color:white;">2. BAYAR 1.0 PI</button>

    <script>
        // Inisialisasi awal
        window.onload = function() {
            try {
                Pi.init({ version: "2.0", sandbox: false });
                document.getElementById('st').innerText = "SYSTEM CONNECTED";
                document.getElementById('st').style.color = "lime";
            } catch (e) {
                document.getElementById('st').innerText = "SDK ERROR: Guna Pi Browser!";
            }
        }

        function loginUser() {
            Pi.authenticate(['payments'], function(auth) {
                alert("Login Berjaya: " + auth.user.username);
                document.getElementById('st').innerText = "USER: " + auth.user.username;
            }, function(err) {
                alert("Ralat Login: " + err.message);
            });
        }

        function bayarPi() {
            Pi.createPayment({
                amount: 1.0,
                memo: "Mainnet Verification Step 10",
                metadata: { orderId: "MBL-10-FINAL" }
            }, {
                onReadyForServerApproval: (id) => { console.log(id); },
                onReadyForServerCompletion: (id, tx) => { alert("BAYARAN BERJAYA! TXID: " + tx); },
                onCancel: (id) => { alert("Batal"); },
                onError: (e) => { alert("Ralat: " + e.message); }
            });
        }
    </script>
</body>
</html>
