
<!DOCTYPE html>
<html>
<head>
    <title>MB Legacy Store</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        Pi.init({ version: "2.0", sandbox: true });
    </script>
</head>
<body style="text-align: center; padding-top: 50px;">
    <h1>MB Legacy Store</h1>
    <button onclick="authPi()" style="padding: 20px; background: gold;">1. KLIK UNTUK LOGIN PI</button>
    <br><br>
    <button onclick="buatBayaran()" style="padding: 20px; background: orange;">2. KLIK UNTUK BAYAR</button>

    <script>
        function authPi() {
            Pi.authenticate(['payments'], onIncompletePaymentFound).then(function(auth) {
                alert("Login Berjaya: " + auth.user.username);
            });
        }

        function onIncompletePaymentFound(payment) {
            console.log("Ada payment sangkut");
        }

        async function buatBayaran() {
            try {
                await Pi.createPayment({
                    amount: 0.1,
                    memo: "Test Tahap 10",
                    metadata: { orderId: "123" }
                }, {
                    onReadyForServerApproval: (id) => alert("Dah sedia! ID: " + id),
                    onReadyForServerCompletion: (id, txid) => alert("Selesai! TXID: " + txid),
                    onCancel: (id) => alert("Batal"),
                    onError: (err) => alert("Masih error scope? Tekan Login dulu kat atas.")
                });
            } catch (e) { alert(e.message); }
        }
    </script>
</body>
</html>
