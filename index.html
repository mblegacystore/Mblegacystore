<!DOCTYPE html>
<html>
<head>
    <title>Test</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1>Pi SDK Test</h1>
    <button onclick="test()">Login Test</button>
    <p id="msg"></p>
    <script>
        Pi.init({ version: "2.0", sandbox: true });
        function test() {
            document.getElementById('msg').innerText = "Loading...";
            Pi.authenticate(['username'], function(auth) {
                document.getElementById('msg').innerText = "✅ OK: " + auth.user.username;
            }, function(err) {
                document.getElementById('msg').innerText = "❌ Error: " + err.message;
            });
        }
    </script>
</body>
</html>
