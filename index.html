<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MB Legacy Store</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="text-align: center; padding-top: 50px; font-family: sans-serif; background-color: #f9f9f9;">
    <h2 style="color: #673ab7;">MB LEGACY STORE</h2>
    <div id="status" style="color: red; font-weight: bold; margin-bottom: 20px;">Menunggu SDK...</div>
    
    <button onclick="login()" style="padding: 15px; width: 220px; font-size: 16px; cursor: pointer;">
        1. LOGIN PI NETWORK
    </button>
    <br><br>
    <button onclick="bayar()" style="padding: 15px; width: 220px; font-size: 16px; background: #673ab7; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
        2. BAYAR 1.0 PI
    </button>

    <script>
        // Inisialisasi Pi SDK
        try {
            Pi.init({ version: "2.0", sandbox: false });
            document.getElementById('status').innerHTML = "Sistem SEDIA! (Mainnet Mode)";
            document.getElementById('status').style.color = "green";
        } catch (err) {
            document.getElementById('status').innerHTML = "SDK Gagal Load. Sila guna Pi Browser!";
        }

        function login() {
            Pi.authenticate(['payments'], (p) => {
                alert("Selamat Datang " + p.user.username + "!");
            }, (e) => alert("Ralat Login: " + e.message));
        }

        function bayar() {
            Pi.createPayment({
                amount: 1.0,
                memo: "Pembayaran MB Legacy Store - Tahap 10",
                metadata: { orderId: "mbl-main-100" }
            }, {
                onReadyForServerApproval: (id) => {
                    console.log("Payment Approved:", id);
                },
                onReadyForServerCompletion: (id, txid) => {
                    alert("ALHAMDULILLAH! Bayaran 1.0 Pi Berjaya. TXID: " + txid);
                },
                onCancel: (id) => alert("Bayaran Dibatalkan"),
                onError: (e) => alert("Error: " + e.message)
            });
        }
    </script>
</body>
</html>
