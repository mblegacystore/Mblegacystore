
<!DOCTYPE html>
<html>
<head>
    <title>MB Legacy Store</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        Pi.init({ version: "2.0", sandbox: true });
    </script>
</head>
<body style="text-align: center; padding-top: 50px; font-family: sans-serif;">
    <h1>MB Legacy Store</h1>
    <p>Tahap 10: Ujian Transaksi</p>
    <button onclick="buatBayaran()" style="padding: 15px 30px; background-color: gold; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">
        BAYAR 1 TEST PI
    </button>

    <script>
        async function buatBayaran() {
            try {
                const payment = await Pi.createPayment({
                    amount: 1,
                    memo: "Test Transaction Tahap 10",
                    metadata: { orderId: "mbl-001" }
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        console.log("Menunggu pengesahan:", paymentId);
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        alert("Bayaran Berjaya! TXID: " + txid);
                    },
                    onCancel: (paymentId) => {
                        console.log("Bayaran dibatalkan.");
                    },
                    onError: (error, payment) => {
                        alert("Ralat: " + error.message);
                    }
                });
            } catch (err) {
                alert("Sistem error: " + err.message);
            }
        }
    </script>
</body>
</html>
