<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MB Legacy Store</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="text-align: center; padding-top: 50px; font-family: Arial, sans-serif;">
    <h1>MB LEGACY STORE</h1>
    <p>Status: <span id="st" style="color: blue;">Memulakan...</span></p>
    
    <button onclick="login()" style="padding: 15px 30px; margin: 10px;">1. LOGIN</button>
    <br>
    <button onclick="bayar()" style="padding: 15px 30px; background: #673ab7; color: white; border: none; border-radius: 8px;">2. BAYAR 1.0 PI</button>

    <script>
        try {
            Pi.init({ version: "2.0", sandbox: false });
            document.getElementById('st').innerText = "SEDIA (Mainnet)";
            document.getElementById('st').style.color = "green";
        } catch (e) {
            document.getElementById('st').innerText = "Ralat SDK!";
        }

        function login() {
            Pi.authenticate(['payments'], function(p) {
                alert("Berjaya Login: " + p.user.username);
            }, function(e) { alert("Ralat: " + e.message); });
        }

        function bayar() {
            Pi.createPayment({
                amount: 1.0,
                memo: "Settle Tahap 10",
                metadata: { orderId: "mbl-final" }
            }, {
                onReadyForServerApproval: function(id) { console.log(id); },
                onReadyForServerCompletion: function(id, tx) { alert("Berjaya! TX: " + tx); },
                onCancel: function(id) { alert("Batal"); },
                onError: function(e) { alert("Ralat: " + e.message); }
            });
        }
    </script>
</body>
</html>
