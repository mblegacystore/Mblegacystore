
<!DOCTYPE html>
<html>
<head>
    <title>MB Legacy Store</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>Pi.init({ version: "2.0", sandbox: true });</script>
</head>
<body style="text-align: center; padding-top: 50px;">
    <h2>MB Legacy Store - Tahap 10</h2>
    <button onclick="Pi.authenticate(['payments'], (p)=>{}) .then((a)=>alert('Login Berjaya'))" style="padding: 15px; background: gold;">1. LOGIN DULU</button>
    <br><br>
    <button onclick="bayar()" style="padding: 15px; background: orange;">2. BAYAR 0.01 PI</button>

    <script>
        function bayar() {
            Pi.createPayment({
                amount: 0.01,
                memo: "Final Test",
                metadata: { orderId: "mbl-1" }
            }, {
                onReadyForServerApproval: (id) => { console.log(id); },
                onReadyForServerCompletion: (id, txid) => { alert('SUKSES! TXID: ' + txid); },
                onCancel: (id) => { alert('Batal'); },
                onError: (e) => { alert('Ralat: ' + e.message); }
            });
        }
    </script>
</body>
</html>
