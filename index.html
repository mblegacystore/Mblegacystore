<!DOCTYPE html>
<html>
<head>
    <title>MBL STORE</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="text-align:center; padding-top:100px;">
    <h1>MB LEGACY STORE</h1>
    <p id="st">Status: Ready</p>
    <br>
    <button onclick="login()" style="padding:20px; width:80%;">1. CONNECT ACCOUNT</button>
    <br><br>
    <button onclick="pay()" style="padding:20px; width:80%;">2. PAY 1.0 PI</button>

    <script>
        // ✅ Guna sandbox untuk ujian
        Pi.init({ version: "2.0", sandbox: true });

        function login() {
            document.getElementById('st').innerText = "Connecting...";
            Pi.authenticate(['payments'], function(a) {
                document.getElementById('st').innerText = "User: " + a.user.username;
                alert("Success!");
            }, function(e) {
                alert("Error: " + e.message);
                document.getElementById('st').innerText = "Status: Login Failed";
            });
        }

        function pay() {
            Pi.createPayment({
                amount: 1.0,
                memo: "Final Test",
                metadata: { id: "10" }
            }, {
                onReadyForServerApproval: (id) => {
                    console.log("Payment ID ready:", id);
                },
                onReadyForServerCompletion: (id, tx) => {
                    alert("Done: " + tx);
                },
                onCancel: (id) => {
                    alert("Cancel");
                },
                onError: (e) => {
                    alert("Error: " + e.message);
                },
                // ✅ Tambah ni untuk elak stuck
                onIncompletePaymentFound: (payment) => {
                    alert("Pembayaran sebelum ini belum selesai: " + payment.identifier);
                }
            });
        }
    </script>
</body>
</html>
