<!DOCTYPE html>
<html>
<head>
    <title>MB LEGACY</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="text-align:center; padding-top:50px;">
    <h1>MB LEGACY STORE</h1>
    <button onclick="Pi.init({version:'2.0',sandbox:false}); alert('Sistem Sedia!')">
        Langkah 1: AKTIFKAN SISTEM
    </button>
    <br><br>
    <button onclick="Pi.authenticate(['payments'], (p)=>alert('Login: '+p.user.username))">
        Langkah 2: LOGIN
    </button>
    <br><br>
    <button onclick="bayar()" style="background:purple; color:white; padding:15px;">
        Langkah 3: BAYAR 1 PI
    </button>

    <script>
        function bayar() {
            Pi.createPayment({
                amount: 1.0,
                memo: "Settle Tahap 10",
                metadata: { orderId: "101" }
            }, {
                onReadyForServerApproval: (id) => console.log(id),
                onReadyForServerCompletion: (id, tx) => alert("Berjaya! TX: " + tx),
                onCancel: (id) => alert("Batal"),
                onError: (e) => alert("Ralat: " + e.message)
            });
        }
    </script>
</body>
</html>
