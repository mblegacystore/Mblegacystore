<!DOCTYPE html><html><head><title>MBL STORE</title><script src="https://sdk.minepi.com/pi-sdk.js"></script></head><body style="text-align:center;padding:20px;font-family:Arial,sans-serif;background:#0d0d0d;color:white;"><h1 style="color:#f5c542;font-size:28px;">🔥 MB LEGACY STORE 🔥</h1><div style="background:#1a1a1a;border-radius:12px;padding:15px;margin:20px auto;max-width:400px;"><p id="st" style="font-size:14px;color:#ccc;">⏳ Tunggu sebentar...</p></div><button id="btn-login" style="padding:15px;width:90%;max-width:400px;font-size:16px;font-weight:bold;background:#6c3ce0;color:white;border:none;border-radius:30px;margin-bottom:10px;" disabled>🔐 CONNECT ACCOUNT</button><br><button id="btn-pay1" style="padding:15px;width:90%;max-width:400px;font-size:16px;font-weight:bold;background:#f5a623;color:#000;border:none;border-radius:30px;margin-bottom:10px;" disabled>💰 PAY 1.0 PI</button><br><button id="btn-pay10" style="padding:15px;width:90%;max-width:400px;font-size:16px;font-weight:bold;background:#e74c3c;color:white;border:none;border-radius:30px;margin-bottom:10px;" disabled>🔥 PAY 10 PI</button><br><button id="btn-cancel" style="padding:12px;width:90%;max-width:400px;font-size:14px;font-weight:bold;background:#95a5a6;color:white;border:none;border-radius:30px;margin-bottom:10px;" disabled>🗑️ CANCEL PENDING</button><br><br><p style="color:#555;font-size:11px;">Powered by Pi Network • MBL STORE © 2025</p><script>function onIncompletePaymentFound(p){document.getElementById('st').innerText="Pembayaran tertunda: "+p.identifier;document.getElementById('btn-cancel').disabled=false;}function createPayment(a,m,b){document.getElementById('st').innerText="Memproses "+a+" Pi...";document.getElementById(b).disabled=true;document.getElementById(b).style.opacity="0.6";Pi.createPayment({amount:a,memo:m,metadata:{id:Date.now().toString()}},{onReadyForServerApproval:function(pid){document.getElementById('st').innerText="Meluluskan...";fetch('/api/finalize',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({paymentId:pid})});},onReadyForServerCompletion:function(pid,tx){document.getElementById('st').innerText="Bayaran "+a+" Pi berjaya!";document.getElementById(b).disabled=false;document.getElementById(b).style.opacity="1";alert("Berjaya! TX: "+tx);},onCancel:function(){document.getElementById('st').innerText="Dibatalkan.";document.getElementById(b).disabled=false;document.getElementById(b).style.opacity="1";},onError:function(e){document.getElementById('st').innerText="Ralat.";document.getElementById(b).disabled=false;document.getElementById(b).style.opacity="1";},onIncompletePaymentFound:onIncompletePaymentFound});}window.onload=function(){if(typeof Pi==='undefined'){document.getElementById('st').innerText="Pi SDK tidak dimuatkan.";return;}Pi.init({version:"2.0",sandbox:true});document.getElementById('st').innerText="Status: Sedia.";document.getElementById('btn-login').disabled=false;};document.getElementById('btn-login').addEventListener('click',function(){document.getElementById('st').innerText="Menyambung...";this.disabled=true;Pi.authenticate(['username','payments'],onIncompletePaymentFound).then(function(auth){document.getElementById('st').innerText="User: "+auth.user.username;document.getElementById('btn-login').disabled=false;document.getElementById('btn-pay1').disabled=false;document.getElementById('btn-pay10').disabled=false;document.getElementById('btn-cancel').disabled=false;}).catch(function(e){document.getElementById('st').innerText="Gagal sambung.";document.getElementById('btn-login').disabled=false;});});document.getElementById('btn-pay1').addEventListener('click',function(){createPayment(1.0,"MBL Store - 1 Pi",'btn-pay1');});document.getElementById('btn-pay10').addEventListener('click',function(){createPayment(10.0,"MBL Store - 10 Pi",'btn-pay10');});document.getElementById('btn-cancel').addEventListener('click',function(){var pid=prompt("Masukkan Payment ID:");if(!pid)return;document.getElementById('st').innerText="Membatalkan...";this.disabled=true;fetch('/api/cancel',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({paymentId:pid})}).then(r=>r.json()).then(d=>{if(d.success){document.getElementById('st').innerText="Berjaya dibatalkan!";alert("Berjaya!");}else{document.getElementById('st').innerText="Gagal.";alert("Gagal: "+JSON.stringify(d));}document.getElementById('btn-cancel').disabled=false;}).catch(function(){document.getElementById('st').innerText="Ralat.";document.getElementById('btn-cancel').disabled=false;});});</script></body></html>
